<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LART Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --red:#ff0000; --red-dim:#8a0000; --gold:#c9a84c; }
  body { background:#050000; font-family:'Rajdhani',sans-serif; color:white; min-height:100vh; }
  .bg-layer { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120,0,0,0.2) 0%, transparent 70%), #050000; }
  .grid-lines { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,0,0,0.04) 1px, transparent 1px); background-size:40px 40px; animation:gridMove 20s linear infinite; }
  @keyframes gridMove { to { transform:translateY(40px); } }

  /* UNIQUE ADMIN ANIMATION: one guard character at bottom-right, slow breath */
  .character-guard {
    position:fixed; bottom:0; right:-80px; z-index:2; pointer-events:none;
    
  }
  .character-guard img { width:280px; filter:drop-shadow(6px 0 20px rgba(255,0,0,0.4)) brightness(0.8); }
  @keyframes guardBreath {
    0%,100% { transform:translateY(0px) scale(1); }
    50%      { transform:translateY(-8px) scale(1.01); }
  }

  .char-glow-guard { position:fixed; bottom:0; right:-80px; width:280px; height:100px; z-index:1; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,0,0,0.15) 0%, transparent 80%); }

  .side-deco { position:fixed; top:0; bottom:0; width:3px; z-index:1; pointer-events:none; background:linear-gradient(180deg, transparent, rgba(255,0,0,0.3) 30%, rgba(255,0,0,0.6) 50%, rgba(255,0,0,0.3) 70%, transparent); animation:sidePulse 3s ease-in-out infinite; }
  .side-deco-left{left:0;} .side-deco-right{right:0;}
  @keyframes sidePulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
  .corner { position:fixed; width:40px; height:40px; z-index:3; }
  .corner::before, .corner::after { content:''; position:absolute; background:var(--red); box-shadow:0 0 8px var(--red); }
  .corner-tl{top:16px;left:16px;} .corner-tl::before{top:0;left:0;width:100%;height:2px;} .corner-tl::after{top:0;left:0;width:2px;height:100%;}
  .corner-tr{top:16px;right:16px;} .corner-tr::before{top:0;right:0;width:100%;height:2px;} .corner-tr::after{top:0;right:0;width:2px;height:100%;}
  .corner-bl{bottom:16px;left:16px;} .corner-bl::before{bottom:0;left:0;width:100%;height:2px;} .corner-bl::after{bottom:0;left:0;width:2px;height:100%;}
  .corner-br{bottom:16px;right:16px;} .corner-br::before{bottom:0;right:0;width:100%;height:2px;} .corner-br::after{bottom:0;right:0;width:2px;height:100%;}

  /* LOGIN */
  #login-screen { position:relative; z-index:10; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .login-card { background:rgba(15,0,0,0.9); border:1px solid rgba(255,0,0,0.2); border-radius:20px; padding:44px 32px; width:90%; max-width:360px; text-align:center; backdrop-filter:blur(20px); box-shadow:0 0 60px rgba(255,0,0,0.15); }
  .login-card h2 { font-family:'Orbitron',monospace; font-size:14px; color:var(--red); letter-spacing:2px; margin-bottom:6px; }
  .login-card p { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-transform:uppercase; margin-bottom:24px; }
  .login-card input { width:100%; padding:14px 16px; background:rgba(255,0,0,0.05); border:1px solid rgba(255,0,0,0.2); border-radius:10px; color:white; font-size:15px; outline:none; margin-bottom:12px; font-family:'Rajdhani',sans-serif; }
  .login-card input:focus { border-color:rgba(255,0,0,0.45); }
  .login-card button { width:100%; padding:16px; background:linear-gradient(90deg,var(--red),var(--red-dim)); color:white; border:none; border-radius:10px; font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; cursor:pointer; transition:all 0.25s; }
  .login-card button:hover { box-shadow:0 0 30px rgba(255,0,0,0.5); transform:translateY(-1px); }

  /* ADMIN PANEL */
  #admin-panel { display:none; position:relative; z-index:10; padding:24px; max-width:960px; margin:0 auto; }
  .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; padding-bottom:16px; border-bottom:1px solid rgba(255,0,0,0.15); }
  .admin-header h1 { font-family:'Orbitron',monospace; font-size:16px; color:var(--red); letter-spacing:2px; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
  .stat-card { background:rgba(255,0,0,0.05); border:1px solid rgba(255,0,0,0.1); border-radius:14px; padding:16px; text-align:center; }
  .stat-card .val { font-family:'Orbitron',monospace; font-size:26px; color:var(--red); }
  .stat-card .lbl { font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
  table { width:100%; border-collapse:collapse; }
  thead th { font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; padding:10px 12px; text-align:left; border-bottom:1px solid rgba(255,0,0,0.1); }
  tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.15s; }
  tbody tr:hover { background:rgba(255,0,0,0.04); }
  tbody td { padding:14px 12px; font-size:14px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; letter-spacing:1px; text-transform:uppercase; }
  .badge.pending  { background:rgba(255,200,0,0.1); color:#ffc800; border:1px solid rgba(255,200,0,0.2); }
  .badge.approved { background:rgba(0,255,136,0.1); color:#00ff88; border:1px solid rgba(0,255,136,0.2); }
  .badge.rejected { background:rgba(255,0,0,0.1);  color:#ff4444; border:1px solid rgba(255,0,0,0.2); }
  .actions { display:flex; gap:8px; }
  .approve-btn { padding:6px 14px; background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3); color:#00ff88; border-radius:8px; cursor:pointer; font-size:12px; transition:all 0.2s; }
  .approve-btn:hover { background:rgba(0,255,136,0.2); }
  .reject-btn  { padding:6px 14px; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); color:#ff4444; border-radius:8px; cursor:pointer; font-size:12px; transition:all 0.2s; }
  .reject-btn:hover { background:rgba(255,0,0,0.2); }
  .refresh-btn { padding:8px 18px; background:rgba(255,0,0,0.08); border:1px solid rgba(255,0,0,0.2); color:white; border-radius:10px; cursor:pointer; font-size:13px; }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-lines"></div>
<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>
<div class="side-deco side-deco-left"></div><div class="side-deco side-deco-right"></div>
<div class="char-glow-guard"></div>
<div class="character-guard"><img src="character.png" alt=""></div>

<div id="login-screen">
  <div class="login-card">
    <h2>🔐 ADMIN PANEL</h2>
    <p>Только для администратора</p>
    <input type="password" id="pass" placeholder="Введите пароль" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">ВОЙТИ В СИСТЕМУ</button>
    <div id="login-error" style="color:#ff4444;font-size:12px;margin-top:10px;display:none">Неверный пароль</div>
  </div>
</div>

<div id="admin-panel">
  <div class="admin-header">
    <h1>⚡ LART ADMIN</h1>
    <button class="refresh-btn" onclick="loadUsers()">🔄 Обновить</button>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="val" id="total">0</div><div class="lbl">Всего</div></div>
    <div class="stat-card"><div class="val" id="pending-count">0</div><div class="lbl">Ожидают</div></div>
    <div class="stat-card"><div class="val" id="approved-count">0</div><div class="lbl">Одобрено</div></div>
  </div>
  <table>
    <thead><tr><th>Имя</th><th>PocketOption ID</th><th>Статус</th><th>Дата</th><th>Действия</th></tr></thead>
    <tbody id="users-table"></tbody>
  </table>
</div>

<script>
async function adminLogin() {
  const pass=document.getElementById('pass').value;
  const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
  const data=await res.json();
  if (data.ok) { document.getElementById('login-screen').style.display='none'; document.getElementById('admin-panel').style.display='block'; loadUsers(); }
  else document.getElementById('login-error').style.display='block';
}

async function loadUsers() {
  const res=await fetch('/api/admin/users');
  const data=await res.json();
  if (!data.ok) return;
  const users=data.users;
  document.getElementById('total').textContent=users.length;
  document.getElementById('pending-count').textContent=users.filter(u=>u.status==='pending').length;
  document.getElementById('approved-count').textContent=users.filter(u=>u.status==='approved').length;
  const tbody=document.getElementById('users-table');
  tbody.innerHTML='';
  users.forEach(u=>{
    const tr=document.createElement('tr');
    const date=u.created_at?u.created_at.slice(0,16).replace('T',' '):'—';
    const actions=u.status==='pending'?`<div class="actions"><button class="approve-btn" onclick="approve('${u.pocket_id}')">✓ Одобрить</button><button class="reject-btn" onclick="reject('${u.pocket_id}')">✗ Отклонить</button></div>`:'—';
    tr.innerHTML=`<td>${u.name}</td><td style="font-family:monospace">${u.pocket_id}</td><td><span class="badge ${u.status}">${u.status}</span></td><td style="color:rgba(255,255,255,0.4)">${date}</td><td>${actions}</td>`;
    tbody.appendChild(tr);
  });
}

async function approve(pocket_id) { await fetch('/api/admin/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pocket_id})}); loadUsers(); }
async function reject(pocket_id)  { await fetch('/api/admin/reject', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pocket_id})}); loadUsers(); }
setInterval(()=>{ if(document.getElementById('admin-panel').style.display==='block') loadUsers(); },30000);
</script>
</body>
</html>
