<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LART Trade AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff0000;
    --red-dim: #8a0000;
    --red-glow: rgba(255, 0, 0, 0.35);
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --bg: #050000;
    --card-bg: rgba(15, 0, 0, 0.85);
  }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Animated background */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120,0,0,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 0%, rgba(60,0,0,0.2) 0%, transparent 70%),
      #050000;
  }

  /* Animated grid lines */
  .grid-lines {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Particles */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: var(--red);
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    background: var(--card-bg);
    border: 1px solid rgba(255,0,0,0.15);
    border-radius: 24px;
    padding: 48px 36px 40px;
    width: 92%;
    max-width: 400px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 80px rgba(255,0,0,0.12),
      0 0 0 1px rgba(255,255,255,0.04) inset;
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--red);
    border-style: solid;
  }
  .card::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
    border-radius: 24px 0 0 0;
  }
  .card::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 24px 0;
  }

  /* Logo container — NO black box */
  .logo-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 28px;
  }

  .logo-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,0,0,0.3);
    animation: spin 8s linear infinite;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    top: -2px; left: 50%;
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--red);
    transform: translateX(-50%);
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .logo-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 70%);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.1); }
  }

  .logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    position: relative;
    z-index: 1;
    display: block;
    filter: drop-shadow(0 0 12px rgba(255,0,0,0.6));
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,0,0,0.08);
    border: 1px solid rgba(255,0,0,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    font-family: 'Orbitron', monospace;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    animation: cardIn 0.8s 0.2s both;
  }

  .badge-dot {
    width: 5px;
    height: 5px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--red);
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* Title */
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    animation: cardIn 0.8s 0.3s both;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    animation: cardIn 0.8s 0.4s both;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,0,0,0.3), transparent);
  }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--red);
    transform: rotate(45deg);
    box-shadow: 0 0 6px var(--red);
  }

  /* Subtitle */
  p {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
    letter-spacing: 0.5px;
    animation: cardIn 0.8s 0.45s both;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 22px 0;
    animation: cardIn 0.8s 0.5s both;
  }

  .stat {
    background: rgba(255,0,0,0.05);
    border: 1px solid rgba(255,0,0,0.1);
    border-radius: 12px;
    padding: 10px 6px;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--red);
  }

  .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* CTA button */
  .main-btn {
    display: block;
    margin-top: 24px;
    padding: 18px;
    background: linear-gradient(90deg, var(--red) 0%, #cc0000 50%, var(--red-dim) 100%);
    color: white;
    border-radius: 14px;
    text-decoration: none;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(255,0,0,0.4), 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.8s 0.6s both;
  }

  .main-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .main-btn:hover::before { transform: translateX(100%); }

  .main-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(255,0,0,0.6), 0 8px 30px rgba(0,0,0,0.6);
  }

  .main-btn:active { transform: translateY(0); }

</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-lines"></div>

<!-- Floating particles -->
<div class="particle" style="left:10%; animation-duration:8s; animation-delay:0s;"></div>
<div class="particle" style="left:25%; animation-duration:11s; animation-delay:2s;"></div>
<div class="particle" style="left:50%; animation-duration:9s; animation-delay:1s;"></div>
<div class="particle" style="left:70%; animation-duration:13s; animation-delay:3s;"></div>
<div class="particle" style="left:85%; animation-duration:7s; animation-delay:0.5s;"></div>
<div class="particle" style="left:40%; animation-duration:10s; animation-delay:4s;"></div>

<div class="card">

  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-ring"></div>
    <img src="logo.png" class="logo" alt="LART">
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    AI Online
  </div>

  <h1>LART Trade AI</h1>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <p>AI анализирует рынок в реальном времени<br>и находит точки входа с высокой точностью</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-value">87%</div>
      <div class="stat-label">Точность</div>
    </div>
    <div class="stat">
      <div class="stat-value">22</div>
      <div class="stat-label">Пары</div>
    </div>
    <div class="stat">
      <div class="stat-value">24/7</div>
      <div class="stat-label">Онлайн</div>
    </div>
  </div>

  <a href="select.html" class="main-btn">
    ⚡ Начать анализ
  </a>

</div>

</body>
</html>
