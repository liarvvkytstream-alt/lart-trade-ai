<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LART — Анализ рынка</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #ff0000; --red-dim: #8a0000; --gold: #c9a84c; --gold-light: #f0d080; }

  body {
    background: #050000;
    font-family: 'Rajdhani', sans-serif;
    color: white;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; overflow: hidden;
  }

  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120,0,0,0.25) 0%, transparent 70%), #050000;
  }
  .grid-lines {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(255,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { transform: translateY(40px); } }

  .card {
    position: relative; z-index: 1;
    background: rgba(15,0,0,0.85);
    border: 1px solid rgba(255,0,0,0.15);
    border-radius: 24px;
    padding: 48px 32px 40px;
    width: 92%; max-width: 380px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(255,0,0,0.12);
    animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  .card::before, .card::after {
    content: ''; position: absolute;
    width: 20px; height: 20px;
    border-color: var(--red); border-style: solid;
  }
  .card::before { top:-1px; left:-1px; border-width: 2px 0 0 2px; border-radius: 24px 0 0 0; }
  .card::after  { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; border-radius: 0 0 24px 0; }
  @keyframes cardIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:none; } }

  /* Scanner radar */
  .radar {
    position: relative;
    width: 140px; height: 140px;
    margin: 0 auto 32px;
  }

  .radar-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,0,0,0.2);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
  }
  .radar-ring:nth-child(1) { width: 140px; height: 140px; border-color: rgba(255,0,0,0.15); }
  .radar-ring:nth-child(2) { width: 100px; height: 100px; border-color: rgba(255,0,0,0.2); }
  .radar-ring:nth-child(3) { width: 60px;  height: 60px;  border-color: rgba(255,0,0,0.3); }

  .radar-sweep {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, rgba(255,0,0,0.4) 0deg, rgba(255,0,0,0.0) 90deg, transparent 90deg);
    animation: sweep 2s linear infinite;
  }
  @keyframes sweep { to { transform: rotate(360deg); } }

  .radar-center {
    position: absolute; top:50%; left:50%;
    width: 8px; height: 8px;
    background: var(--red); border-radius: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 12px var(--red);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* Crosshairs */
  .radar::before, .radar::after {
    content: ''; position: absolute;
    background: rgba(255,0,0,0.15);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
  }
  .radar::before { width: 1px; height: 100%; }
  .radar::after  { width: 100%; height: 1px; }

  /* Blips */
  .blip {
    position: absolute; width: 5px; height: 5px;
    background: var(--red); border-radius: 50%;
    box-shadow: 0 0 8px var(--red);
    animation: blipFade 2s ease-in-out infinite;
  }
  .blip:nth-child(5) { top: 28%; left: 62%; animation-delay: 0.3s; }
  .blip:nth-child(6) { top: 58%; left: 25%; animation-delay: 0.9s; }
  .blip:nth-child(7) { top: 70%; left: 65%; animation-delay: 1.5s; }
  @keyframes blipFade { 0%,100%{opacity:0;} 50%{opacity:1;} }

  h2 {
    font-family: 'Orbitron', monospace;
    font-size: 13px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 10px;
  }

  /* Animated status lines */
  .status-lines {
    margin: 24px 0 0;
    text-align: left;
    display: flex; flex-direction: column; gap: 8px;
  }
  .status-line {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: rgba(255,255,255,0.4);
    letter-spacing: 1px; text-transform: uppercase;
    opacity: 0;
    animation: lineIn 0.4s ease both;
  }
  .status-line:nth-child(1) { animation-delay: 0.3s; }
  .status-line:nth-child(2) { animation-delay: 0.9s; }
  .status-line:nth-child(3) { animation-delay: 1.5s; }
  .status-line:nth-child(4) { animation-delay: 2.1s; }
  @keyframes lineIn { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:none;} }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    background: var(--red); box-shadow: 0 0 6px var(--red);
    animation: pulse 1s ease-in-out infinite;
  }
  .status-line.done .status-dot { background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: none; }
  .status-line.done { color: rgba(255,255,255,0.6); }

  .progress-bar {
    margin-top: 24px; height: 2px;
    background: rgba(255,0,0,0.1); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--red-dim), var(--red));
    box-shadow: 0 0 8px var(--red);
    animation: progress 3s ease-out forwards;
  }
  @keyframes progress { from{width:0%;} to{width:100%;} }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-lines"></div>
<div class="card">
  <div class="radar">
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-sweep"></div>
    <div class="blip"></div>
    <div class="blip"></div>
    <div class="blip"></div>
    <div class="radar-center"></div>
  </div>

  <h2>AI сканирует рынок</h2>

  <div class="status-lines">
    <div class="status-line done"><div class="status-dot"></div>Подключение к рынку</div>
    <div class="status-line" id="s2"><div class="status-dot"></div>Загрузка котировок</div>
    <div class="status-line" id="s3"><div class="status-dot"></div>Расчёт EMA индикаторов</div>
    <div class="status-line" id="s4"><div class="status-dot"></div>Формирование сигнала</div>
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<script>
  setTimeout(() => document.getElementById('s2').classList.add('done'), 900);
  setTimeout(() => document.getElementById('s3').classList.add('done'), 1500);
  setTimeout(() => document.getElementById('s4').classList.add('done'), 2400);
  setTimeout(() => { window.location = "result.html"; }, 3200);
</script>
</body>
</html>
