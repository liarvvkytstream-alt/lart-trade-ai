<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LART Trade AI — Сигналы</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --red:#ff0000; --red-dim:#8a0000; --gold:#c9a84c; --gold-light:#f0d080; }

  body { background:#050000; font-family:'Rajdhani',sans-serif; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; min-height:-webkit-fill-available; overflow-x:hidden; padding:20px 16px 90px; }
  .bg-layer { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120,0,0,0.25) 0%, transparent 70%), #050000; }
  .grid-lines { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,0,0,0.04) 1px, transparent 1px); background-size:40px 40px; animation:gridMove 20s linear infinite; }
  @keyframes gridMove { to { transform:translateY(40px); } }
  .scanlines { position:fixed; inset:0; z-index:0; pointer-events:none; background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); }

  .character { position:fixed; bottom:0; z-index:2; pointer-events:none; }
  .character-left { left:-55px; }
  .character-left img { width:300px; transform:scaleX(-1); filter:drop-shadow(-8px 0 30px rgba(255,0,0,0.6)) brightness(0.95); }
  .character-right { right:-55px; }
  .character-right img { width:300px; filter:drop-shadow(8px 0 30px rgba(255,0,0,0.6)) brightness(0.95); }
  @media (max-width:900px) { .character,.char-glow { display:none; } }

  .signal-flash { position:fixed; inset:0; z-index:20; pointer-events:none; background:rgba(255,0,0,0.08); opacity:0; }
  .signal-flash.active { animation:flashBurst 0.6s ease-out forwards; }
  @keyframes flashBurst { 0%{opacity:0.4;} 100%{opacity:0;} }

  .char-glow { position:fixed; bottom:0; width:280px; height:110px; z-index:1; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,0,0,0.2) 0%, transparent 80%); }
  .char-glow-left{left:-70px;} .char-glow-right{right:-70px;}
  .side-deco { position:fixed; top:0; bottom:0; width:3px; z-index:1; pointer-events:none; background:linear-gradient(180deg, transparent, rgba(255,0,0,0.35) 30%, rgba(255,0,0,0.7) 50%, rgba(255,0,0,0.35) 70%, transparent); animation:sidePulse 2.5s ease-in-out infinite; }
  .side-deco-left{left:0;} .side-deco-right{right:0;}
  @keyframes sidePulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
  .corner { position:fixed; width:32px; height:32px; z-index:3; }
  .corner::before,.corner::after { content:''; position:absolute; background:var(--red); box-shadow:0 0 8px var(--red); }
  .corner-tl{top:12px;left:12px;} .corner-tl::before{top:0;left:0;width:100%;height:2px;} .corner-tl::after{top:0;left:0;width:2px;height:100%;}
  .corner-tr{top:12px;right:12px;} .corner-tr::before{top:0;right:0;width:100%;height:2px;} .corner-tr::after{top:0;right:0;width:2px;height:100%;}
  .corner-bl{bottom:12px;left:12px;} .corner-bl::before{bottom:0;left:0;width:100%;height:2px;} .corner-bl::after{bottom:0;left:0;width:2px;height:100%;}
  .corner-br{bottom:12px;right:12px;} .corner-br::before{bottom:0;right:0;width:100%;height:2px;} .corner-br::after{bottom:0;right:0;width:2px;height:100%;}

  /* TOAST */
  .toast { position:fixed; top:16px; right:16px; z-index:100; background:rgba(10,0,0,0.95); border:1px solid rgba(255,0,0,0.4); border-radius:14px; padding:12px 16px; width:220px; box-shadow:0 0 30px rgba(255,0,0,0.3); backdrop-filter:blur(20px); transform:translateX(140%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events:none; }
  .toast.show { transform:translateX(0); }
  .toast-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .toast-icon { width:28px; height:28px; border-radius:50%; background:rgba(255,0,0,0.15); border:1px solid rgba(255,0,0,0.4); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; animation:toastPulse 1s ease-in-out infinite; }
  @keyframes toastPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,0.4);} 50%{box-shadow:0 0 0 5px rgba(255,0,0,0);} }
  .toast-title { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--red); }
  .toast-body { font-size:12px; color:rgba(255,255,255,0.65); line-height:1.5; }
  .toast-body strong { color:white; }
  .toast-prob { font-family:'Orbitron',monospace; font-size:16px; font-weight:900; color:#00ff88; }
  .toast-bar { height:2px; background:rgba(255,0,0,0.15); border-radius:2px; margin-top:8px; overflow:hidden; }
  .toast-bar-fill { height:100%; background:var(--red); border-radius:2px; width:100%; transition:width linear; }

  /* CARD */
  .card { position:relative; z-index:10; background:rgba(15,0,0,0.88); border:1px solid rgba(255,0,0,0.18); border-radius:24px; padding:24px 20px 20px; width:calc(100% - 32px); max-width:390px; text-align:center; backdrop-filter:blur(24px); box-shadow:0 0 60px rgba(255,0,0,0.15); animation:cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both; }
  .card::before,.card::after { content:''; position:absolute; width:20px; height:20px; border-color:var(--red); border-style:solid; }
  .card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:24px 0 0 0;}
  .card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 24px 0;}
  @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(0.97);}to{opacity:1;transform:none;} }

  .logo-wrap { position:relative; width:64px; height:64px; margin:0 auto 10px; }
  .logo-ring { position:absolute; inset:-6px; border-radius:50%; border:1.5px solid rgba(255,0,0,0.35); animation:spin 6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .logo-glow { position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle, rgba(255,0,0,0.25) 0%, transparent 70%); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
  .logo { width:64px; height:64px; border-radius:50%; object-fit:cover; position:relative; z-index:1; filter:drop-shadow(0 0 10px rgba(255,0,0,0.6)); }

  h1 { font-family:'Orbitron',monospace; font-size:13px; font-weight:900; letter-spacing:2px; background:linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, var(--gold) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:2px; }



  .divider { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .divider-line { flex:1; height:1px; background:linear-gradient(90deg, transparent, rgba(255,0,0,0.35), transparent); }
  .divider-diamond { width:5px; height:5px; background:var(--red); transform:rotate(45deg); box-shadow:0 0 6px var(--red); }

  /* STANDARD MODE */


  .tf-label { font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .tf-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:12px; }
  .tf-btn { padding:9px 4px; background:rgba(255,0,0,0.05); border:1px solid rgba(255,0,0,0.12); border-radius:10px; color:rgba(255,255,255,0.5); cursor:pointer; font-family:'Orbitron',monospace; font-size:9px; transition:all 0.2s; }
  .tf-btn.active { border-color:rgba(255,0,0,0.5); color:white; background:rgba(255,0,0,0.12); box-shadow:0 0 10px rgba(255,0,0,0.2); }

  .signal-box { background:rgba(255,0,0,0.05); border:1px solid rgba(255,0,0,0.15); border-radius:14px; padding:16px 14px; margin-bottom:10px; position:relative; overflow:hidden; min-height:130px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
  .signal-box::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, rgba(255,0,0,0.5), transparent); }

  .loading-radar { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .radar-mini { width:44px; height:44px; border:2px solid rgba(255,0,0,0.2); border-radius:50%; position:relative; }
  .radar-mini::after { content:''; position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 0deg, rgba(255,0,0,0.6) 0deg, transparent 90deg); animation:radarSpin 1.5s linear infinite; }
  @keyframes radarSpin { to{transform:rotate(360deg);} }
  .loading-text { font-size:10px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1.5px; animation:blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .pair-val { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; background:linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, var(--gold) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
  .dir { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; letter-spacing:2px; }
  .dir.up   { color:#00ff88; text-shadow:0 0 20px rgba(0,255,136,0.5); }
  .dir.down { color:var(--red); text-shadow:0 0 20px rgba(255,0,0,0.6); }
  .arrow { font-size:18px; margin-bottom:8px; }
  .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; margin-top:8px; }
  .stat { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:8px; }
  .stat-val { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; color:var(--red); }
  .stat-lbl { font-size:9px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

  .prob-wrap { margin:8px 0; }
  .prob-header { display:flex; justify-content:space-between; margin-bottom:4px; font-size:10px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:1px; }
  .prob-val-label { font-family:'Orbitron',monospace; color:var(--red); }
  .prob-track { height:4px; background:rgba(255,0,0,0.1); border-radius:4px; overflow:hidden; }
  .prob-fill { height:100%; background:linear-gradient(90deg,var(--red-dim),var(--red)); box-shadow:0 0 8px var(--red); border-radius:4px; transition:width 1s cubic-bezier(0.16,1,0.3,1); width:0%; }

  /* AI Explanation box */
  .ai-explain {
    display:none; margin-bottom:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,0,0,0.12);
    border-left:2px solid rgba(255,0,0,0.4);
    border-radius:12px; padding:12px 14px;
    text-align:left;
  }
  .ai-explain.up-exp { border-left-color:rgba(0,255,136,0.5); }
  .ai-explain-header { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
  .ai-explain-dot { width:6px; height:6px; border-radius:50%; background:var(--red); }
  .ai-explain-dot.up { background:#00ff88; }
  .ai-explain-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.35); }
  .ai-explain-text { font-size:12px; color:rgba(255,255,255,0.6); line-height:1.7; }
  .ai-explain-loading { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:1px; animation:blink 1s ease-in-out infinite; }

  .get-btn { display:block; width:100%; padding:15px; background:linear-gradient(90deg,var(--red) 0%,#cc0000 50%,var(--red-dim) 100%); color:white; border:none; border-radius:12px; cursor:pointer; font-family:'Orbitron',monospace; font-weight:700; font-size:11px; letter-spacing:2px; text-transform:uppercase; box-shadow:0 0 24px rgba(255,0,0,0.4); transition:all 0.25s; position:relative; overflow:hidden; }
  .get-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent); transform:translateX(-100%); transition:transform 0.5s; }
  .get-btn:hover::before { transform:translateX(100%); }
  .get-btn:active { transform:scale(0.98); }
  .get-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .logout { margin-top:12px; font-size:11px; color:rgba(255,255,255,0.2); cursor:pointer; text-decoration:underline; }

  /* BOTTOM NAVBAR */
  /* navbar height compensated in body padding above */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    background:rgba(4,0,0,0.97);
    border-top:1px solid rgba(255,0,0,0.35);
    backdrop-filter:blur(30px);
    display:flex; align-items:stretch; height:68px;
    box-shadow:0 -4px 30px rgba(255,0,0,0.12), 0 -1px 0 rgba(255,0,0,0.08);
  }
  .bottom-nav::before {
    content:''; position:absolute; top:0; left:5%; right:5%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,0,0,0.6) 30%, rgba(255,0,0,0.8) 50%, rgba(255,0,0,0.6) 70%, transparent);
    box-shadow:0 0 12px rgba(255,0,0,0.5);
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; cursor:pointer; border:none; background:transparent; color:inherit;
    padding:8px 4px 10px; position:relative; transition:all 0.25s;
  }
  .nav-item::after {
    content:''; position:absolute; bottom:0; left:15%; right:15%; height:0px;
    background:linear-gradient(90deg, transparent, var(--red), transparent);
    box-shadow:0 0 10px rgba(255,0,0,0.8);
    border-radius:2px 2px 0 0; opacity:0; transition:all 0.25s;
  }
  .nav-item.active::after { height:2px; opacity:1; }
  .nav-item.active { background:rgba(255,0,0,0.05); }
  .nav-item:active { transform:scale(0.9); }
  .nav-icon {
    font-size:20px; line-height:1;
    opacity:0.35; transition:all 0.25s;
    filter:grayscale(1);
  }
  .nav-item.active .nav-icon {
    opacity:1; filter:none;
    filter:drop-shadow(0 0 8px rgba(255,0,0,0.7));
  }
  .nav-label {
    font-family:'Orbitron',monospace; font-size:7px; letter-spacing:1.5px;
    color:rgba(255,255,255,0.22); text-transform:uppercase; transition:color 0.25s;
  }
  .nav-item.active .nav-label { color:var(--red); text-shadow:0 0 8px rgba(255,0,0,0.5); }
  .nav-sep { width:1px; background:linear-gradient(180deg,transparent,rgba(255,0,0,0.2),transparent); align-self:stretch; margin:12px 0; }
  .nav-badge {
    position:absolute; top:7px; right:calc(50% - 18px);
    background:linear-gradient(135deg,var(--red),#cc0000);
    color:white; font-family:'Orbitron',monospace; font-size:7px; font-weight:700;
    border-radius:8px; padding:2px 5px; min-width:16px; text-align:center;
    box-shadow:0 0 8px rgba(255,0,0,0.6);
  }


  /* SIGNAL HISTORY ITEMS */
  .sig-item { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:10px; transition:border-color 0.2s; }
  .sig-item.win  { border-color:rgba(0,255,136,0.2); background:rgba(0,255,136,0.03); }
  .sig-item.loss { border-color:rgba(255,0,0,0.2); background:rgba(255,0,0,0.03); }
  .sig-dir { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .sig-dir.up   { background:rgba(0,255,136,0.12); border:1px solid rgba(0,255,136,0.3); }
  .sig-dir.down { background:rgba(255,0,0,0.12); border:1px solid rgba(255,0,0,0.3); }
  .sig-info { flex:1; min-width:0; }
  .sig-pair { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; color:white; }
  .sig-meta { font-size:10px; color:rgba(255,255,255,0.28); margin-top:1px; }
  .sig-prob { font-family:'Orbitron',monospace; font-size:11px; color:var(--red); flex-shrink:0; }
  .sig-rate { display:flex; gap:5px; flex-shrink:0; }
  .rate-win  { width:28px; height:28px; border-radius:8px; background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.25); color:#00ff88; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .rate-win:hover  { background:rgba(0,255,136,0.2); transform:scale(1.1); }
  .rate-loss { width:28px; height:28px; border-radius:8px; background:rgba(255,0,0,0.08); border:1px solid rgba(255,0,0,0.25); color:#ff4444; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .rate-loss:hover { background:rgba(255,0,0,0.2); transform:scale(1.1); }
  .rate-done { font-size:16px; }
  /* STATS PAGE */
  .page-section { display:none; }
  .page-section.active { display:block; }
  .stat-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
  .stat-box { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:14px; text-align:center; }
  .stat-box-val { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; }
  .stat-box-val.green { color:#00ff88; text-shadow:0 0 12px rgba(0,255,136,0.4); }
  .stat-box-val.red { color:var(--red); text-shadow:0 0 12px rgba(255,0,0,0.4); }
  .stat-box-val.gold { color:var(--gold); }
  .stat-box-lbl { font-size:9px; color:rgba(255,255,255,0.28); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }
  .wr-wrap { background:rgba(255,255,255,0.03); border:1px solid rgba(255,0,0,0.1); border-radius:12px; padding:14px; margin-bottom:10px; }
  .wr-header { display:flex; justify-content:space-between; font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .wr-val { font-family:'Orbitron',monospace; color:#00ff88; }
  .wr-track { height:6px; background:rgba(255,0,0,0.08); border-radius:6px; overflow:hidden; }
  .wr-fill { height:100%; background:linear-gradient(90deg,#00aa55,#00ff88); border-radius:6px; transition:width 1.2s cubic-bezier(0.16,1,0.3,1); width:0%; }

  /* SUBSCRIBE PAGE */
  .sub-hero { border-radius:16px; padding:20px; margin-bottom:12px; text-align:center; position:relative; overflow:hidden; }
  .sub-hero.active-sub { background:linear-gradient(135deg,rgba(0,255,136,0.07) 0%,rgba(0,180,90,0.04) 100%); border:1px solid rgba(0,255,136,0.2); }
  .sub-hero.no-sub { background:linear-gradient(135deg,rgba(255,0,0,0.07) 0%,rgba(139,0,0,0.04) 100%); border:1px solid rgba(255,0,0,0.18); }
  .sub-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); }
  .sub-big { font-family:'Orbitron',monospace; font-size:38px; font-weight:900; line-height:1; }
  .sub-big.green { color:#00ff88; text-shadow:0 0 20px rgba(0,255,136,0.5); }
  .sub-big.red { color:var(--red); text-shadow:0 0 20px rgba(255,0,0,0.5); }
  .sub-big-lbl { font-size:10px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:1.5px; margin-top:6px; }
  .sub-rows { background:rgba(255,255,255,0.02); border:1px solid rgba(255,0,0,0.1); border-radius:12px; padding:4px 14px; margin-bottom:12px; }
  .sub-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:12px; }
  .sub-row:last-child { border-bottom:none; }
  .sub-row-lbl { color:rgba(255,255,255,0.35); }
  .sub-row-val { font-family:'Orbitron',monospace; font-size:11px; color:white; }
  .sub-row-val.green { color:#00ff88; }
  .page-title { font-family:'Orbitron',monospace; font-size:12px; font-weight:900; letter-spacing:2px; background:linear-gradient(135deg,#fff,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
  .page-sub { font-size:9px; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-lines"></div>
<div class="scanlines"></div>
<div class="signal-flash" id="flash"></div>
<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>
<div class="side-deco side-deco-left"></div><div class="side-deco side-deco-right"></div>
<div class="char-glow char-glow-left"></div><div class="char-glow char-glow-right"></div>
<div class="character character-left"><img src="character.png" alt=""></div>
<div class="character character-right"><img src="character.png" alt=""></div>

<div class="toast" id="toast">
  <div class="toast-top"><div class="toast-icon">⚡</div><div class="toast-title">Сильный сигнал!</div></div>
  <div class="toast-body" id="toast-body">Готовьтесь!</div>
  <div class="toast-bar"><div class="toast-bar-fill" id="toast-bar-fill"></div></div>
</div>

<div class="card" id="card-trade">
  <div class="logo-wrap"><div class="logo-glow"></div><div class="logo-ring"></div><img src="logo.png" class="logo" alt="LART"></div>
  <h1>LART Trade AI</h1>

  <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
    <p class="tf-label">Выберите таймфрейм</p>
    <div class="tf-grid">
      <button class="tf-btn active" onclick="setTF(this,1)">1 МИН</button>
      <button class="tf-btn" onclick="setTF(this,3)">3 МИН</button>
      <button class="tf-btn" onclick="setTF(this,5)">5 МИН</button>
      <button class="tf-btn" onclick="setTF(this,30)">30 МИН</button>
    </div>
    <div class="signal-box" id="signal-box">
      <div style="color:rgba(255,255,255,0.25);font-size:12px;letter-spacing:1px;">Нажмите кнопку для получения сигнала</div>
    </div>
    <div class="prob-wrap">
      <div class="prob-header"><span>Вероятность</span><span class="prob-val-label" id="prob-label">—</span></div>
      <div class="prob-track"><div class="prob-fill" id="prob-bar"></div></div>
    </div>
    <div class="ai-explain" id="ai-explain">
      <div class="ai-explain-header"><div class="ai-explain-dot" id="ai-dot"></div><div class="ai-explain-title">Анализ AI</div></div>
      <div class="ai-explain-text" id="ai-explain-text"></div>
    </div>
    <button class="get-btn" id="get-btn" onclick="getSignal()">⚡ Получить сигнал</button>
  <div style="text-align:center;margin-top:10px;"><span class="logout" onclick="logout()">Выйти</span></div>
</div>

<!-- STATS PAGE -->
<div class="card page-section" id="card-stats" style="display:none;">
  <div class="page-title">Статистика</div>
  <div class="page-sub">История сигналов</div>
  <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

  <!-- WINRATE BAR -->
  <div class="wr-wrap" style="margin-bottom:14px;">
    <div class="wr-header">
      <span style="display:flex;gap:12px;">
        <span style="color:#00ff88;">✓ <span id="st-wins">0</span> побед</span>
        <span style="color:rgba(255,255,255,0.2);">|</span>
        <span style="color:var(--red);">✗ <span id="st-losses">0</span> потерь</span>
      </span>
      <span class="wr-val" id="st-wr-val">—</span>
    </div>
    <div class="wr-track"><div class="wr-fill" id="st-wr-bar"></div></div>
  </div>

  <!-- SIGNALS LIST -->
  <div id="signals-list" style="display:flex;flex-direction:column;gap:7px;max-height:440px;overflow-y:auto;padding-right:2px;">
    <div style="text-align:center;color:rgba(255,255,255,0.2);font-size:12px;padding:20px;">Загрузка...</div>
  </div>
</div>

<!-- SUBSCRIBE PAGE -->
<div class="card page-section" id="card-sub" style="display:none;">
  <div class="page-title">Подписка</div>
  <div class="page-sub">Статус доступа</div>
  <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
  <div id="sub-hero-box" class="sub-hero no-sub">
    <div class="sub-big red" id="sub-big-num">—</div>
    <div class="sub-big-lbl" id="sub-big-lbl">Загрузка...</div>
  </div>
  <div class="sub-rows">
    <div class="sub-row"><span class="sub-row-lbl">Бесплатных сигналов</span><span class="sub-row-val" id="sub-limit">—</span></div>
    <div class="sub-row"><span class="sub-row-lbl">Использовано</span><span class="sub-row-val" id="sub-used">—</span></div>
    <div class="sub-row"><span class="sub-row-lbl">Стоимость</span><span class="sub-row-val green">100 USDT TRC20</span></div>
  </div>
  <div id="sub-btn-wrap"></div>
</div>

<!-- BOTTOM NAVBAR -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-trade" onclick="switchPage('trade')">
    <span class="nav-icon">⚡</span>
    <span class="nav-label">Торговля</span>
  </button>
  <div class="nav-sep"></div>
  <button class="nav-item" id="nav-stats" onclick="switchPage('stats')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Статистика</span>
  </button>
  <div class="nav-sep"></div>
  <button class="nav-item" id="nav-sub" onclick="switchPage('sub')">
    <span class="nav-icon">💎</span>
    <span class="nav-label">Подписка</span>
    <span class="nav-badge" id="nav-badge" style="display:none;"></span>
  </button>
</nav>

<script>
const pocket_id = localStorage.getItem('pocket_id');
if (!pocket_id) window.location='login.html';

let selectedTF = 1;
let toastTimer = null;

document.addEventListener('DOMContentLoaded', () => {
  loadSubBadge();
});

function setTF(btn, tf) {
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); selectedTF=tf;
}


function switchPage(page) {
  document.getElementById('card-trade').style.display = page==='trade' ? 'block' : 'none';
  document.getElementById('card-stats').style.display = page==='stats' ? 'block' : 'none';
  document.getElementById('card-sub').style.display = page==='sub' ? 'block' : 'none';
  ['trade','stats','sub'].forEach(p => {
    document.getElementById('nav-'+p).classList.toggle('active', p===page);
  });
  if (page==='stats') loadStats();
  if (page==='sub') loadSubInfo();
}

async function loadStats() {
  try {
    const res = await fetch('/api/profile/' + pocket_id);
    const data = await res.json();
    if (!data.ok) return;
    const s = data.stats;
    document.getElementById('st-wins').textContent = s.wins;
    document.getElementById('st-losses').textContent = s.losses;
    document.getElementById('st-wr-val').textContent = s.rated > 0 ? s.winrate + '%' : '—';
    setTimeout(() => { document.getElementById('st-wr-bar').style.width = s.winrate + '%'; }, 100);
    renderSignals(data.signals);
  } catch(e) {
    document.getElementById('signals-list').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.2);font-size:12px;padding:20px;">Ошибка загрузки</div>';
  }
}

function renderSignals(signals) {
  const list = document.getElementById('signals-list');
  if (!signals || signals.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.2);font-size:12px;padding:20px;">Сигналов пока нет</div>';
    return;
  }
  list.innerHTML = signals.map(s => {
    const isUp = s.direction.includes('ВВЕРХ');
    const date = s.created_at ? s.created_at.slice(0,16).replace('T',' ') : '';
    const itemClass = s.result === 'win' ? 'win' : s.result === 'loss' ? 'loss' : '';
    const rateHtml = s.result
      ? `<span class="rate-done">${s.result === 'win' ? '✅' : '❌'}</span>`
      : `<div class="sig-rate">
           <button class="rate-win" onclick="rateSignal(${s.id}, 'win', this)" title="Победа">✓</button>
           <button class="rate-loss" onclick="rateSignal(${s.id}, 'loss', this)" title="Потеря">✗</button>
         </div>`;
    return `<div class="sig-item ${itemClass}" id="sig-${s.id}">
      <div class="sig-dir ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'}</div>
      <div class="sig-info">
        <div class="sig-pair">${s.pair}</div>
        <div class="sig-meta">${s.timeframe} мин · ${date.slice(5,16)}</div>
      </div>
      <div class="sig-prob">${s.probability}%</div>
      ${rateHtml}
    </div>`;
  }).join('');
}

async function rateSignal(signalId, result, btn) {
  try {
    const res = await fetch('/api/signal/rate', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({signal_id: signalId, pocket_id, result})
    });
    const data = await res.json();
    if (data.ok) {
      loadStats(); // reload to update stats + list
    }
  } catch(e) {}
}

async function loadSubBadge() {
  try {
    const res = await fetch('/api/subscribe/info?pocket_id=' + pocket_id);
    const data = await res.json();
    if (!data.ok) return;
    const badge = document.getElementById('nav-badge');
    if (data.subscribed && data.sub_expires_at) {
      const days = Math.max(0, Math.ceil((new Date(data.sub_expires_at) - new Date()) / 86400000));
      if (days <= 7) { badge.textContent = days+'д'; badge.style.display=''; }
    }
  } catch(e) {}
}

async function loadSubInfo() {
  try {
    const res = await fetch('/api/subscribe/info?pocket_id=' + pocket_id);
    const data = await res.json();
    if (!data.ok) return;
    document.getElementById('sub-limit').textContent = data.limit;
    document.getElementById('sub-used').textContent = data.signals_used;
    const hero = document.getElementById('sub-hero-box');
    const bigNum = document.getElementById('sub-big-num');
    const bigLbl = document.getElementById('sub-big-lbl');
    const btnWrap = document.getElementById('sub-btn-wrap');
    if (data.subscribed && data.sub_expires_at) {
      const days = Math.max(0, Math.ceil((new Date(data.sub_expires_at) - new Date()) / 86400000));
      hero.className = 'sub-hero ' + (days <= 5 ? 'no-sub' : 'active-sub');
      bigNum.className = 'sub-big ' + (days <= 5 ? 'red' : 'green');
      bigNum.textContent = days;
      bigLbl.textContent = days <= 5 ? 'дней — обновите скоро!' : 'дней осталось';
      btnWrap.innerHTML = days <= 7 ? '<button class="get-btn" style="font-size:10px;padding:12px;" onclick="goSubscribe()">🔄 Продлить подписку</button>' : '';
    } else {
      const rem = Math.max(0, data.limit - data.signals_used);
      hero.className = 'sub-hero no-sub';
      bigNum.className = 'sub-big red';
      bigNum.textContent = rem;
      bigLbl.textContent = 'бесплатных сигналов осталось';
      btnWrap.innerHTML = '<button class="get-btn" onclick="goSubscribe()">💎 Оформить подписку</button>';
    }
  } catch(e) {}
}



function playAlert(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'strong') {
      [0, 0.15, 0.3].forEach((delay, i) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 600 + i * 150; osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.12);
        osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.15);
      });
    } else {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 440; osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.12);
    }
  } catch(e) {}
}

function showToast(probability, symbol) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-body').innerHTML = `Пара: <strong>${symbol}</strong><br>Точность: <span class="toast-prob">${probability}%</span>`;
  const bar = document.getElementById('toast-bar-fill');
  bar.style.transition = 'none'; bar.style.width = '100%';
  toast.classList.add('show');
  setTimeout(() => { bar.style.transition = 'width 4s linear'; bar.style.width = '0%'; }, 50);
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4500);
}

// ===== STANDARD SIGNAL =====
async function getSignal() {
  const btn=document.getElementById('get-btn'), box=document.getElementById('signal-box');
  const explainBox = document.getElementById('ai-explain');
  const explainText = document.getElementById('ai-explain-text');
  const aiDot = document.getElementById('ai-dot');

  btn.disabled=true;
  box.innerHTML=`<div class="loading-radar"><div class="radar-mini"></div><div class="loading-text">AI анализирует рынок...</div></div>`;
  document.getElementById('prob-label').textContent='—';
  document.getElementById('prob-bar').style.width='0%';
  explainBox.style.display='none';

  try {
    const res=await fetch(`/signal?timeframe=${selectedTF}&pocket_id=${pocket_id}`);
    if (res.status===403){
      const errData = await res.json();
      if (errData.error === 'limit_reached') {
        window.location='subscribe.html';
        return;
      }
      window.location='login.html';
      return;
    }
    if (res.status===402){window.location='subscribe.html';return;}
    const data=await res.json();
    const isUp=data.direction.includes('ВВЕРХ');
    const prob=parseInt(data.probability);

    document.getElementById('flash').classList.add('active');
    setTimeout(()=>document.getElementById('flash').classList.remove('active'),600);

    if (prob >= 80) { playAlert('strong'); showToast(prob, data.symbol); }
    else { playAlert('normal'); }

    box.innerHTML=`
      <div class="pair-val">${data.symbol}</div>
      <div class="dir ${isUp?'up':'down'}">${isUp?'ВВЕРХ':'ВНИЗ'}</div>
      <div class="arrow" style="color:${isUp?'#00ff88':'#ff0000'}">${isUp?'▲':'▼'}</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-val">${data.timeframe} мин</div><div class="stat-lbl">Таймфрейм</div></div>
        <div class="stat"><div class="stat-val">${prob}%</div><div class="stat-lbl">Точность</div></div>
      </div>`;

    document.getElementById('prob-label').textContent=prob+'%';
    setTimeout(()=>{document.getElementById('prob-bar').style.width=prob+'%';},100);

    // Показываем блок объяснения с загрузкой
    explainBox.style.display='block';
    explainBox.className='ai-explain';
    aiDot.className='ai-explain-dot';
    explainText.innerHTML='<span class="ai-explain-loading">Claude AI формирует объяснение...</span>';

    // Запрашиваем объяснение от Claude AI параллельно
    getAIExplanation(data.symbol, data.direction, prob, data.timeframe, isUp);

  } catch(e) {
    box.innerHTML=`<div style="color:#ff4444;font-size:12px;">Ошибка получения сигнала</div>`;
  }
  btn.disabled=false;
}

async function getAIExplanation(symbol, direction, prob, timeframe, isUp) {
  const explainBox = document.getElementById('ai-explain');
  const explainText = document.getElementById('ai-explain-text');
  const aiDot = document.getElementById('ai-dot');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Ты профессиональный трейдер-аналитик. Сигнал по паре ${symbol}: направление ${direction}, вероятность ${prob}%, таймфрейм ${timeframe} минут.

Напиши краткое объяснение сигнала (2-3 предложения) на русском языке — что видит алгоритм на рынке: какие индикаторы, тренд, моментум. Пиши уверенно и профессионально. Только текст объяснения, без приветствий.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text.trim();

    explainBox.className = 'ai-explain' + (isUp ? ' up-exp' : '');
    aiDot.className = 'ai-explain-dot' + (isUp ? ' up' : '');
    explainText.textContent = text;

  } catch(e) {
    explainText.textContent = `${direction} сигнал подтверждён алгоритмом. Вероятность ${prob}%.`;
  }
}


function goSubscribe() { window.location = 'subscribe.html'; }
function logout(){ window.location='login.html'; }
</script>
</body>
</html>
